{% extends "base.html" %}

{% block title %}Inicio - Mizu Tickets{% endblock %}

{% block content %}
<h1>Mizu Tickets</h1>
{% if current_user.is_authenticated %}
  <p>Bienvenido, {{ current_user.name }}.</p>
  <form method="post" action="{{ url_for('auth.logout') }}">
    <button type="submit">Cerrar sesion</button>
  </form>
{% else %}
  <p><a href="{{ url_for('auth.login') }}">Iniciar sesion</a></p>
  <p><a href="{{ url_for('auth.register') }}">Registrarme</a></p>
{% endif %}
{% endblock %}
