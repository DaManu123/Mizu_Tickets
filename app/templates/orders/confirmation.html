{% extends "base.html" %}

{% block title %}Confirmacion - Mizu Tickets{% endblock %}

{% block content %}
<h1>Compra confirmada</h1>
<p>Orden #{{ order.id }}</p>
<p>Total: ${{ '%.2f'|format(order.total_amount) }}</p>
<p>Fecha: {{ order.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
<p><a href="{{ url_for('main.catalog') }}">Volver al catalogo</a></p>
{% endblock %}
